# PR/branch gate (Phase 0.2). Release builds live in release.yml (tag-driven).
# This runs lint + typecheck + unit tests + e2e for the web layer, and
# fmt + clippy + tests for the Rust backend.

name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  rust:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # tauri's build script validates the externalBin sidecars exist, so
      # clippy/test won't compile without them (they're gitignored).
      - name: Fetch ffmpeg/ffprobe sidecars
        run: node scripts/fetch-ffmpeg.mjs
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - name: rustfmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - name: clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - name: test
        run: cargo test --manifest-path src-tauri/Cargo.toml
