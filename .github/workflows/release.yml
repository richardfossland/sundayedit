# Build, sign, notarize, and publish SundayEdit for macOS + Windows on a
# version tag. Mirrors SundayRec's release flow (Phase 9.2).
#
# Cut a release:   npm version <patch|minor|major>  (or bump versions by hand)
#                  git tag vX.Y.Z && git push origin vX.Y.Z
#
# The tag push triggers this workflow, which produces a DRAFT GitHub Release
# with the signed installers + the updater `latest.json`. Review the draft,
# then publish it — installed apps pick up the update from the `latest`
# release endpoint configured in tauri.conf.json.
#
# Required repository secrets are documented in docs/DISTRIBUTION.md.

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-latest is an Apple Silicon (arm64) runner, but the build
          # targets universal-apple-darwin: both rust std targets are
          # installed, the x86_64 slice is cross-compiled, and one fat
          # DMG/app serves Apple Silicon AND Intel Macs. fetch-ffmpeg runs
          # in --universal mode so the ffmpeg/ffprobe sidecars are lipo'd
          # fat binaries too (a universal Tauri build needs the per-arch
          # sidecars for each cargo slice plus the -universal one for the
          # bundler).
          #
          # `whisper` compiles whisper.cpp (cmake + C++) for real on-device
          # transcription; `llm` enables the Claude-API AI features. Without
          # them the released app stubs both. Cloud OpenAI isn't feature-gated,
          # so it works regardless. `diarize` stays off — its sidecar binary
          # isn't bundled yet.
          - platform: macos-latest
            args: "--target universal-apple-darwin --features whisper,llm"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            sidecar-args: "--universal"
          - platform: windows-latest
            args: "--features whisper,llm"
            rust-targets: ""
            sidecar-args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache cargo (src-tauri)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Fetch bundled ffmpeg/ffprobe sidecars
        run: node scripts/fetch-ffmpeg.mjs ${{ matrix.sidecar-args }}

      - name: Build, sign, and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── whisper.cpp portable CPU build (macOS) ──────────────────────
          # Force GGML_NATIVE=OFF via a top-level-include cmake file. GitHub's
          # macos-latest is an M1 (no i8mm) whose Xcode mis-detects i8mm under
          # -mcpu=native: the macro probe defines __ARM_FEATURE_MATMUL_INT8
          # while the compile flags carry +noi8mm, so ggml-cpu-quants.c fails
          # ("always_inline 'vmmlaq_s32' requires target feature 'i8mm'").
          # Disabling native drops -mcpu=native so detection and compilation
          # share one baseline — builds on the runner AND runs on all Apple
          # Silicon (incl. M1/M1 Pro). The same include also pins the x86_64
          # slice's instruction baseline (SSE4.2+AVX+F16C, no AVX2) so the
          # universal build runs on every Intel Mac macOS 10.15 supports.
          # whisper-rs-sys forwards CMAKE_* env vars as cmake defines; a
          # FORCE cache entry survives ggml's option() (the WHISPER_NATIVE
          # alias did not — option() reset it).
          CMAKE_PROJECT_TOP_LEVEL_INCLUDES: ${{ matrix.platform == 'macos-latest' && format('{0}/src-tauri/cmake/ggml-ci-portable.cmake', github.workspace) || '' }}
          # ── Updater signing (required) ──────────────────────────────────
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # ── macOS code signing + notarization ───────────────────────────
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Notarization: tauri-action reads APPLE_PASSWORD as the app-specific
          # password. The old APPLE_PASSWORD secret was stale (notarytool 401);
          # the fresh app-specific password lives in APP_SPECIFIC_PASSWORD
          # (added 2026-06-09), so feed that one in.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "SundayEdit ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install. Auto-update is enabled for existing installs."
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
